<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TiDyn Matrix OS v7 · Independent Desks</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #060608;
            --surface: #0d0d12;
            --surface2: #13131a;
            --border: rgba(212,175,55,0.12);
            --gold: #d4af37;
            --gold2: #f5d06a;
            --red: #ff4d4d;
            --green: #00e5a0;
            --muted: #6b6550;
            --text: #e8dfc8;
            --blue: #4da6ff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        body::after { content:''; position:fixed; inset:0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; opacity:0.4; }
        .app { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; position: relative; z-index: 1; }
        .view { display: none; animation: fadeUp 0.4s ease both; }
        .view.active { display: block; }
        .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; }
        .header-left .eyebrow { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--gold); margin-bottom: 6px; }
        .header-left h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 6vw, 64px); letter-spacing: 3px; line-height: 1; background: linear-gradient(135deg, var(--gold2) 0%, var(--gold) 60%, #8c6b1f 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav { display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tab-btn { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 16px; background: none; border: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 24px; margin-bottom: 16px; }
        .card-title { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 4px; }
        .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 3px; font-family: 'Space Mono', monospace; }
        .btn { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 12px; border: none; border-radius: 3px; cursor: pointer; width: 100%; }
        .btn-gold { background: linear-gradient(90deg, var(--gold) 0%, #8c6b1f 100%); color: #000; font-weight: 700; }
        .stat-box { background: var(--surface2); border: 1px solid var(--border); padding: 14px; text-align: center; }
        .s-label { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--muted); }
        .s-val { font-family: 'Bebas Neue', sans-serif; font-size: 26px; }
        .back-btn { background: none; border: none; color: var(--muted); font-family: 'Space Mono', monospace; cursor: pointer; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="app">
    <!-- LAUNCHER -->
    <div id="view-launcher" class="view active">
        <div class="header">
            <div class="header-left"><div class="eyebrow">Independent Strategy Desks</div><h1>TiDyn Matrix OS</h1></div>
        </div>
        <div class="grid-2">
            <div class="card">
                <div class="card-title">Trader Engine</div>
                <div class="stat-box"><div class="s-label">Bankroll</div><div class="s-val">$1,000</div></div>
                <button class="btn btn-gold" style="margin-top:16px;" onclick="switchView('view-trader')">Launch Trader</button>
            </div>
            <div class="card">
                <div class="card-title">Multiversal Engine</div>
                <div class="stat-box"><div class="s-label">Bankroll</div><div class="s-val">$500</div></div>
                <button class="btn btn-gold" style="margin-top:16px;" onclick="switchView('view-betting')">Launch Betting</button>
            </div>
        </div>
    </div>

    <!-- TRADER DESK -->
    <div id="view-trader" class="view">
        <button class="back-btn" onclick="switchView('view-launcher')">← Back to OS</button>
        <h2 style="font-family:'Bebas Neue'; color:var(--gold); margin:16px 0;">Trader Desk</h2>
        <!-- Standard v5/v6 trading components go here -->
    </div>

    <!-- BETTING DESK -->
    <div id="view-betting" class="view">
        <button class="back-btn" onclick="switchView('view-launcher')">← Back to OS</button>
        <h2 style="font-family:'Bebas Neue'; color:var(--gold); margin:16px 0;">Multiversal Desk</h2>
        <!-- Standard v5/v6 betting components go here -->
    </div>
</div>

<script>
    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }
</script>
</body>
                  </html>
