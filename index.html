<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TiDyn Matrix Engine v2</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<style>
  body{background:#0b0c10;color:#e5e7eb;font-family:system-ui}
  [v-cloak]{display:none}
  .card{background:#111318;border:1px solid #1e2229;border-radius:12px;padding:12px}
  .btn{background:#c5a059;color:#0b0c10;font-weight:700;padding:10px;border-radius:8px}
  input{background:#0b0c10;border:1px solid #1e2229;color:white;padding:6px;border-radius:6px;width:100%}
</style>
</head>

<body>
<div id="app" v-cloak>

<header style="padding:12px;border-bottom:1px solid #1e2229">
  <b>TiDyn MATRIX ENGINE v2</b>
</header>

<main style="max-width:1100px;margin:auto;padding:14px">

<!-- INPUT -->
<div class="card" style="margin-bottom:12px">
  <div style="font-size:12px;color:#aaa;margin-bottom:8px">
    Enter BTTS No Odds (4 Matches)
  </div>

  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
    <input v-for="(m,i) in state.matches" :key="i"
      v-model.number="state.matches[i].odds"
      placeholder="Odds"/>
  </div>
</div>

<button class="btn" @click="generate">
  Generate 6 Matrices
</button>

<!-- MATRICES -->
<div v-if="matrices.length" style="margin-top:14px;display:grid;gap:10px">

  <div v-for="(m,i) in matrices" :key="i" class="card">

    <div style="display:flex;justify-content:space-between">
      <b>Matrix {{ i+1 }}</b>
      <span style="color:#c5a059">Parlay: {{ m.parlay.toFixed(2) }}x</span>
    </div>

    <div style="margin-top:10px;font-size:12px">

      <div v-for="s in m.slips" :key="s.label"
        style="display:flex;justify-content:space-between;margin:4px 0">

        <span>{{ s.label }}</span>
        <b>${{ fmt(s.stake) }}</b>

      </div>

    </div>

  </div>

</div>

<!-- SUMMARY -->
<div v-if="matrices.length" class="card" style="margin-top:14px">

  <b>Round Summary</b>

  <div style="margin-top:10px;font-size:12px">

    <div>Total Matrices: {{ matrices.length }}</div>
    <div>Total Stake: ${{ fmt(totalStake) }}</div>
    <div>Per Matrix Stake: ${{ fmt(matrixStake) }}</div>

  </div>

</div>

</main>
</div>

<script>
const { createApp, reactive, ref, computed } = Vue;

createApp({

setup() {

  // =====================
  // STATE
  // =====================
  const state = reactive({
    bankroll: 1000,
    matches: [
      { name: "A", odds: 2.0 },
      { name: "B", odds: 2.1 },
      { name: "C", odds: 2.3 },
      { name: "D", odds: 2.4 }
    ]
  });

  const matrices = ref([]);

  // =====================
  // ENGINE SETTINGS
  // =====================
  const matrixStake = computed(() => state.bankroll * 0.0278);

  // =====================
  // MATRIX ENGINE
  // =====================
  function generatePairs(arr) {
    const pairs = [];
    for (let i = 0; i < arr.length; i++) {
      for (let j = i + 1; j < arr.length; j++) {
        pairs.push([arr[i], arr[j]]);
      }
    }
    return pairs;
  }

  function generate() {

    const pairs = generatePairs(state.matches);

    matrices.value = pairs.map((p) => {

      const a = p[0];
      const b = p[1];

      const parlay = a.odds * b.odds;

      // =====================
      // CORE SLIP STRUCTURE
      // (PLACEHOLDER FOR YOUR LINEAR SOLVER)
      // =====================
      const slips = [
        {
          label: `YES ${a.name}`,
          stake: matrixStake.value * 0.8
        },
        {
          label: `YES ${b.name}`,
          stake: matrixStake.value * 0.8
        },
        {
          label: `NO ${a.name}`,
          stake: matrixStake.value * 1.2
        },
        {
          label: `NO ${b.name}`,
          stake: matrixStake.value * 1.2
        },
        {
          label: `PARLAY NO/NO`,
          stake: matrixStake.value * 0.6
        }
      ];

      return { parlay, slips };

    });

  }

  // =====================
  // SUMMARY
  // =====================
  const totalStake = computed(() =>
    matrices.value.reduce((sum, m) =>
      sum + m.slips.reduce((s, x) => s + x.stake, 0), 0
    )
  );

  function fmt(n){ return Number(n).toFixed(2); }

  return {
    state,
    matrices,
    generate,
    matrixStake,
    totalStake,
    fmt
  };

}

}).mount("#app");
</script>

</body>
</html>
